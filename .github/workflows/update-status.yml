name: Update Minecraft Server Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install mcstatus

    - name: Run Status Script
      run: python update_worker.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 1. Stage the file immediately so it's not "unstaged"
        git add serverstatus.json
        
        # 2. Check if there are actually changes to commit
        if ! git diff --cached --quiet; then
          git commit -m "Update serverstatus.json [skip ci]"
          
          # 3. Pull with rebase now that our local change is committed
          git pull origin main --rebase
          
          # 4. Push the combined result
          git push origin main
        else
          echo "No changes in status detected."
        fi
