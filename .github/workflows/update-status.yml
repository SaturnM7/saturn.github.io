name: Update Minecraft Server Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install mcstatus requests

    - name: Run Status Script
      run: python update_worker.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add serverstatus.json
        
        if ! git diff --cached --quiet; then
          git commit -m "Update serverstatus.json [skip ci]"
          git pull origin main --rebase
          git push origin main
        else
          echo "No status changes to commit."
        fi
