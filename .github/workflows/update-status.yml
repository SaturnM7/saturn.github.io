name: Update Minecraft Server Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Holt die gesamte Git-Historie, um Pull-Konflikte zu vermeiden

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Status-Skript ausführen
      run: python status_worker.py

    - name: Datei in GitHub committen und pushen
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # Erst den neuesten Stand vom Server holen und lokale Änderungen oben draufsetzen
        git pull origin main --rebase
        
        git add serverstatus.json
        
        # Nur committen und pushen, wenn sich die serverstatus.json wirklich geändert hat
        if ! git diff --cached --quiet; then
          git commit -m "Update serverstatus.json [skip ci]"
          git push origin main
        else
          echo "Keine Änderungen am Serverstatus festgestellt."
        fi
