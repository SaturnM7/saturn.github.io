name: Update Minecraft Server Status

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch:      # Allows you to run it manually

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Required to push changes back to the repo
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install mcstatus

    - name: Run Status Script
      run: python update_worker.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # Pull latest changes to avoid conflicts
        git pull origin main --rebase
        
        git add serverstatus.json
        
        # Only commit if the file actually changed
        if ! git diff --cached --quiet; then
          git commit -m "Update serverstatus.json [skip ci]"
          git push origin main
        else
          echo "No changes in status."
        fi
